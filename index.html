<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>КАЗБАТ — Клятва</title>
  <style>
    :root {
      --bg: #070808;
      --panel: rgba(12, 14, 15, 0.72);
      --panel-strong: rgba(9, 11, 12, 0.86);
      --border: rgba(191, 154, 86, 0.22);
      --border-strong: rgba(191, 154, 86, 0.42);
      --text-ghost: rgba(245, 236, 221, 0.22);
      --text-main: #f5ecdd;
      --text-soft: rgba(245, 236, 221, 0.7);
      --accent: #bf9a56;
      --accent-soft: rgba(191, 154, 86, 0.18);
      --danger: #ff5a5a;
      --danger-soft: rgba(255, 90, 90, 0.22);
      --success: #dbc08b;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.5);
      --glow: 0 0 0 1px rgba(191, 154, 86, 0.08), 0 0 28px rgba(191, 154, 86, 0.08), 0 0 80px rgba(191, 154, 86, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text-main);
      background: var(--bg);
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
      background-image:
        linear-gradient(rgba(6, 7, 8, 0.38), rgba(6, 7, 8, 0.72)),
        url("https://i.imgur.com/YOTXI7x.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      backdrop-filter: blur(2px);
      background:
        radial-gradient(circle at 20% 15%, rgba(191, 154, 86, 0.1), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(191, 154, 86, 0.06), transparent 24%),
        linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.22));
      z-index: 0;
    }

    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.16s ease;
      z-index: 20;
      background:
        radial-gradient(circle at center, rgba(255, 90, 90, 0.28), rgba(255, 90, 90, 0.1) 38%, transparent 72%);
      mix-blend-mode: screen;
    }

    .flash.active {
      opacity: 1;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 1100px);
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
        var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow), var(--glow);
      backdrop-filter: blur(12px);
      padding: 28px 28px 22px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(130deg, rgba(191,154,86,0.08), transparent 35%),
        linear-gradient(315deg, rgba(191,154,86,0.05), transparent 38%);
    }

    .card.shake {
      animation: shake 0.38s ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      12% { transform: translateX(-8px); }
      24% { transform: translateX(8px); }
      36% { transform: translateX(-6px); }
      48% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      72% { transform: translateX(4px); }
      84% { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(191, 154, 86, 0.16);
    }

    .subtitle {
      font-size: 14px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
      flex: 1 1 520px;
    }

    .mode-box {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(191,154,86,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mode-btn {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-soft);
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      transition: 0.18s ease;
    }

    .mode-btn:hover {
      color: var(--text-main);
      background: rgba(255,255,255,0.04);
    }

    .mode-btn.active {
      color: #23190b;
      background: linear-gradient(180deg, #d7b97c, #bf9a56);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 10px 24px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(191,154,86,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
    }

    .status-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 28px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .accuracy {
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .error-box {
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      color: #ff8f8f;
      font-weight: 700;
      text-shadow: 0 0 14px rgba(255, 90, 90, 0.18);
      letter-spacing: 0.02em;
      min-height: 22px;
    }

    .error-box.show {
      opacity: 1;
      transform: translateY(0);
    }

    .oath-frame {
      position: relative;
      z-index: 1;
      min-height: 410px;
      border-radius: 24px;
      padding: 24px 22px;
      border: 1px solid rgba(191,154,86,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.008)),
        rgba(7, 8, 8, 0.34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 0 34px rgba(0,0,0,0.2);
      overflow: auto;
      outline: none;
    }

    .oath-frame.focused {
      border-color: rgba(191,154,86,0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 0 1px rgba(191,154,86,0.08), 0 0 28px rgba(191,154,86,0.08);
    }

    .text {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: clamp(18px, 2.15vw, 24px);
      line-height: 1.9;
      letter-spacing: 0.015em;
      user-select: none;
      caret-color: transparent;
      min-height: 100%;
    }

    .char {
      color: var(--text-ghost);
      border-radius: 6px;
      transition:
        color 0.14s ease,
        text-shadow 0.14s ease,
        box-shadow 0.14s ease,
        background-color 0.14s ease,
        border-color 0.14s ease;
      box-shadow: 0 0 0 1px transparent;
    }

    .char.done {
      color: var(--text-main);
      text-shadow: 0 0 8px rgba(255,255,255,0.08);
    }

    .char.error {
      color: var(--danger);
      text-shadow: 0 0 10px rgba(255, 90, 90, 0.25);
      background: rgba(255, 90, 90, 0.06);
      box-shadow: 0 0 0 1px rgba(255, 90, 90, 0.16), 0 0 14px rgba(255, 90, 90, 0.08);
    }

    .char.current {
      color: #fff3d8;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
      text-decoration-color: rgba(191, 154, 86, 0.95);
      text-shadow: 0 0 18px rgba(255, 228, 173, 0.24);
      animation: currentPulse 1.15s ease-in-out infinite;
    }

    @keyframes currentPulse {
      0%, 100% {
        box-shadow: inset 0 -1px 0 rgba(191,154,86,0.12);
      }
      50% {
        box-shadow: inset 0 -2px 0 rgba(191,154,86,0.26), 0 0 18px rgba(191,154,86,0.1);
      }
    }

    .bottom {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .progress-wrap {
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-soft);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(191,154,86,0.14);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(191,154,86,0.55), rgba(245,236,221,0.82), rgba(191,154,86,0.58));
      box-shadow: 0 0 18px rgba(191, 154, 86, 0.18);
      transition: width 0.08s linear;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #23190b;
      background: linear-gradient(180deg, #d7b97c, #bf9a56);
      box-shadow: 0 12px 28px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.24);
      transition: transform 0.14s ease, filter 0.14s ease, box-shadow 0.14s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 30px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .btn:active {
      transform: translateY(0);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(6,7,7,0.72), rgba(6,7,7,0.88));
      backdrop-filter: blur(8px);
      z-index: 15;
    }

    .overlay.show {
      display: grid;
      animation: fadeIn 0.22s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result {
      width: min(100%, 560px);
      text-align: center;
      border-radius: 24px;
      padding: 28px;
      background: var(--panel-strong);
      border: 1px solid rgba(191,154,86,0.22);
      box-shadow: var(--shadow), var(--glow);
    }

    .result .subtitle {
      margin-bottom: 8px;
    }

    .result h2 {
      margin: 0 0 20px;
      font-size: clamp(28px, 5vw, 40px);
      color: var(--text-main);
      text-shadow: 0 0 16px rgba(191,154,86,0.14);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .result-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(191,154,86,0.14);
    }

    .result-item .k {
      font-size: 12px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .result-item .v {
      font-size: 28px;
      font-weight: 800;
      color: var(--success);
    }

    .hidden-input {
      position: fixed;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 18px 16px 16px;
        border-radius: 22px;
      }

      .topbar {
        margin-bottom: 14px;
      }

      .toolbar {
        align-items: stretch;
      }

      .stats,
      .mode-box {
        justify-content: stretch;
      }

      .mode-btn {
        flex: 1 1 160px;
      }

      .stat {
        flex: 1 1 110px;
        min-width: 0;
      }

      .oath-frame {
        min-height: 350px;
        padding: 18px 14px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>

  <div class="app">
    <div class="card" id="card">
      <div class="topbar">
        <div class="title-wrap">
          <div class="title">КАЗБАТ</div>
          <div class="subtitle">Клятва</div>
        </div>

        <div class="toolbar">
          <div class="mode-box">
            <button class="mode-btn active" id="modeHard" type="button">Хардкор режим</button>
            <button class="mode-btn" id="modeEasy" type="button">Лёгкий режим</button>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">Время</div>
              <div class="stat-value" id="timeValue">00:00</div>
            </div>
            <div class="stat">
              <div class="stat-label">Ошибки</div>
              <div class="stat-value" id="errorsValue">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Символы</div>
              <div class="stat-value" id="charsValue">0 / 0</div>
            </div>
          </div>
        </div>
      </div>

      <div class="status-row">
        <div class="accuracy" id="accuracyValue">Точность: 100%</div>
        <div class="error-box" id="errorBox">Ошибка. Начни заново.</div>
      </div>

      <div class="oath-frame focused" id="oathFrame" tabindex="0" aria-label="Клятва">
        <div class="text" id="text"></div>
      </div>

      <div class="bottom">
        <div class="progress-wrap">
          <div class="progress-head">
            <span>Ход</span>
            <span id="progressText">0%</span>
          </div>
          <div class="bar">
            <div class="bar-fill" id="barFill"></div>
          </div>
        </div>
        <button class="btn" id="restartBtn" type="button">Сбросить</button>
      </div>

      <div class="overlay" id="overlay">
        <div class="result">
          <div class="subtitle">Завершено</div>
          <h2>Клятва завершена</h2>
          <div class="result-grid">
            <div class="result-item">
              <div class="k">Время</div>
              <div class="v" id="finalTime">00:00</div>
            </div>
            <div class="result-item">
              <div class="k">Ошибки</div>
              <div class="v" id="finalErrors">0</div>
            </div>
            <div class="result-item">
              <div class="k">Точность</div>
              <div class="v" id="finalAccuracy">100%</div>
            </div>
          </div>
          <button class="btn" id="retryBtn" type="button">Пройти ещё раз</button>
        </div>
      </div>
    </div>
  </div>

  <input class="hidden-input" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

  <script>
    const oathText = `Я, вступая в ряды боевого подразделения КАЗБАТ, перед своими товарищами по оружию торжественно клянусь:

Быть верным своему клану и его бойцам.
Соблюдать дисциплину, уважать командование и выполнять поставленные задачи.
Клянусь действовать как часть единого батальона -
поддерживать своих братьев в бою, не отступать перед трудностями и всегда сражаться до конца.
Клянусь хранить честь КАЗБАТ, укреплять его силу и репутацию на каждом поле боя.
Если потребуется, я готов стоять до последнего вместе со своим отрядом,
потому что сила КАЗБАТ - в единстве его бойцов.

Отныне и навсегда:
Я - боец КАЗБАТ.
Моя честь - честь батальона.
Моя победа - победа КАЗБАТ.

Клянусь!`;

    const MODE_HARD = "hard";
    const MODE_EASY = "easy";

    const chars = Array.from(oathText);

    const textEl = document.getElementById("text");
    const cardEl = document.getElementById("card");
    const oathFrameEl = document.getElementById("oathFrame");
    const flashEl = document.getElementById("flash");
    const errorBoxEl = document.getElementById("errorBox");
    const timeValueEl = document.getElementById("timeValue");
    const errorsValueEl = document.getElementById("errorsValue");
    const charsValueEl = document.getElementById("charsValue");
    const progressTextEl = document.getElementById("progressText");
    const barFillEl = document.getElementById("barFill");
    const accuracyValueEl = document.getElementById("accuracyValue");
    const overlayEl = document.getElementById("overlay");
    const finalTimeEl = document.getElementById("finalTime");
    const finalErrorsEl = document.getElementById("finalErrors");
    const finalAccuracyEl = document.getElementById("finalAccuracy");
    const restartBtn = document.getElementById("restartBtn");
    const retryBtn = document.getElementById("retryBtn");
    const hiddenInput = document.getElementById("hiddenInput");
    const modeHardBtn = document.getElementById("modeHard");
    const modeEasyBtn = document.getElementById("modeEasy");

    let currentIndex = 0;
    let errorCount = 0;
    let started = false;
    let finished = false;
    let startTime = 0;
    let timerId = null;
    let errorLock = false;
    let mode = MODE_HARD;
    let totalTyped = 0;
    let correctTyped = 0;
    let spans = [];

    function renderText() {
      textEl.innerHTML = "";
      const frag = document.createDocumentFragment();

      spans = chars.map((ch, i) => {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = ch;
        if (i === 0) span.classList.add("current");
        frag.appendChild(span);
        return span;
      });

      textEl.appendChild(frag);
      updateStats();
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function updateTimer() {
      if (!started || finished) return;
      timeValueEl.textContent = formatTime(Date.now() - startTime);
    }

    function getAccuracy() {
      if (totalTyped === 0) return 100;
      return Math.round((correctTyped / totalTyped) * 100);
    }

    function updateAccuracy() {
      const accuracy = getAccuracy();
      accuracyValueEl.textContent = `Точность: ${accuracy}%`;
      finalAccuracyEl.textContent = `${accuracy}%`;
    }

    function updateStats() {
      errorsValueEl.textContent = String(errorCount);
      charsValueEl.textContent = `${currentIndex} / ${chars.length}`;
      const percent = chars.length ? Math.round((currentIndex / chars.length) * 100) : 0;
      progressTextEl.textContent = `${percent}%`;
      barFillEl.style.width = `${percent}%`;
      updateAccuracy();
    }

    function isLetterOrDigit(ch) {
      return /[\p{L}\p{N}]/u.test(ch);
    }

    function normalizeExpectedChar(ch) {
      return ch === "—" ? "-" : ch;
    }

    function normalizeInputChar(ch) {
      return ch === "—" ? "-" : ch;
    }

    function focusSurface() {
      oathFrameEl.classList.add("focused");
      hiddenInput.focus({ preventScroll: true });
    }

    function blurSurface() {
      oathFrameEl.classList.remove("focused");
    }

    function ensureVisible(el) {
      if (!el) return;
      const frameRect = oathFrameEl.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      const offsetTop = elRect.top - frameRect.top;
      const offsetBottom = elRect.bottom - frameRect.bottom;

      if (offsetTop < 36) {
        oathFrameEl.scrollTop += offsetTop - 48;
      } else if (offsetBottom > -36) {
        oathFrameEl.scrollTop += offsetBottom + 48;
      }
    }

    function setCurrentChar() {
      spans.forEach(span => span.classList.remove("current"));
      if (currentIndex < spans.length) {
        spans[currentIndex].classList.add("current");
        ensureVisible(spans[currentIndex]);
      }
    }

    function beginIfNeeded() {
      if (started) return;
      started = true;
      startTime = Date.now();
      updateTimer();
      timerId = setInterval(updateTimer, 100);
    }

    function showHardErrorMessage() {
      errorBoxEl.classList.add("show");
      setTimeout(() => {
        if (!errorLock) {
          errorBoxEl.classList.remove("show");
        }
      }, 750);
    }

    function resetVisuals() {
      flashEl.classList.remove("active");
      errorBoxEl.classList.remove("show");
      cardEl.classList.remove("shake");
    }

    function hardReset(keepErrors = false) {
      currentIndex = 0;
      started = false;
      finished = false;
      errorLock = false;
      if (!keepErrors) errorCount = 0;
      startTime = 0;
      totalTyped = 0;
      correctTyped = 0;
      if (timerId) clearInterval(timerId);
      timerId = null;
      timeValueEl.textContent = "00:00";
      overlayEl.classList.remove("show");
      oathFrameEl.scrollTop = 0;

      spans.forEach((span, i) => {
        span.classList.remove("done", "error", "current");
        if (i === 0) span.classList.add("current");
      });

      updateStats();
      resetVisuals();
      focusSurface();
    }

    function triggerResetError() {
      if (errorLock || finished) return;
      errorLock = true;
      errorCount += 1;
      totalTyped += 1;
      updateStats();

      flashEl.classList.add("active");
      errorBoxEl.classList.add("show");
      cardEl.classList.remove("shake");
      void cardEl.offsetWidth;
      cardEl.classList.add("shake");

      currentIndex = 0;
      started = false;
      if (timerId) clearInterval(timerId);
      timerId = null;
      timeValueEl.textContent = "00:00";

      spans.forEach((span, i) => {
        span.classList.remove("done", "error", "current");
        if (i === 0) span.classList.add("current");
      });

      charsValueEl.textContent = `${currentIndex} / ${chars.length}`;
      const percent = chars.length ? Math.round((currentIndex / chars.length) * 100) : 0;
      progressTextEl.textContent = `${percent}%`;
      barFillEl.style.width = `${percent}%`;
      oathFrameEl.scrollTop = 0;

      setTimeout(() => {
        resetVisuals();
        errorLock = false;
        focusSurface();
      }, 760);
    }

    function advanceCorrect() {
      if (currentIndex >= chars.length) return;

      totalTyped += 1;
      correctTyped += 1;

      spans[currentIndex].classList.remove("current", "error");
      spans[currentIndex].classList.add("done");
      currentIndex += 1;

      if (currentIndex >= chars.length) {
        complete();
        updateStats();
        return;
      }

      setCurrentChar();
      updateStats();
    }

    function advanceError() {
      if (currentIndex >= chars.length) return;

      totalTyped += 1;
      errorCount += 1;

      spans[currentIndex].classList.remove("current", "done");
      spans[currentIndex].classList.add("error");
      currentIndex += 1;

      updateStats();
      showHardErrorMessage();

      if (currentIndex >= chars.length) {
        complete();
        return;
      }

      setCurrentChar();
    }

    function complete() {
      finished = true;
      if (timerId) clearInterval(timerId);
      const total = Date.now() - startTime;
      timeValueEl.textContent = formatTime(total);
      finalTimeEl.textContent = formatTime(total);
      finalErrorsEl.textContent = String(errorCount);
      finalAccuracyEl.textContent = `${getAccuracy()}%`;
      overlayEl.classList.add("show");
    }

    function setMode(nextMode) {
      mode = nextMode;
      modeHardBtn.classList.toggle("active", mode === MODE_HARD);
      modeEasyBtn.classList.toggle("active", mode === MODE_EASY);
      focusSurface();
    }

    function normalizeKey(event) {
      if (event.key === "Enter") return "\n";
      if (event.key === "Tab") return null;
      if (event.key.length !== 1) return null;
      return normalizeInputChar(event.key);
    }

    function handleInput(typed) {
      if (finished || errorLock) return;

      beginIfNeeded();

      const expected = normalizeExpectedChar(chars[currentIndex]);

      if (typed === expected) {
        advanceCorrect();
        return;
      }

      if (mode === MODE_EASY) {
        advanceError();
        return;
      }

      if (isLetterOrDigit(expected)) {
        triggerResetError();
      } else {
        advanceError();
      }
    }

    document.addEventListener("keydown", (event) => {
      focusSurface();

      if ((event.ctrlKey || event.metaKey) && ["v", "c", "x", "a"].includes(event.key.toLowerCase())) {
        event.preventDefault();
        return;
      }

      if (
        event.key === "Backspace" ||
        event.key === "Delete" ||
        event.key === "ArrowLeft" ||
        event.key === "ArrowRight" ||
        event.key === "ArrowUp" ||
        event.key === "ArrowDown" ||
        event.key === "Home" ||
        event.key === "End" ||
        event.key === "PageUp" ||
        event.key === "PageDown"
      ) {
        event.preventDefault();
        return;
      }

      const typed = normalizeKey(event);
      if (typed === null) return;

      event.preventDefault();
      handleInput(typed);
    });

    document.addEventListener("paste", (event) => {
      event.preventDefault();
    });

    document.addEventListener("drop", (event) => {
      event.preventDefault();
    });

    hiddenInput.addEventListener("paste", (event) => {
      event.preventDefault();
    });

    hiddenInput.addEventListener("input", () => {
      hiddenInput.value = "";
    });

    oathFrameEl.addEventListener("click", focusSurface);
    document.body.addEventListener("click", () => {
      if (!overlayEl.classList.contains("show")) focusSurface();
    });
    window.addEventListener("focus", focusSurface);
    window.addEventListener("blur", blurSurface);

    restartBtn.addEventListener("click", () => hardReset(false));
    retryBtn.addEventListener("click", () => hardReset(false));

    modeHardBtn.addEventListener("click", () => setMode(MODE_HARD));
    modeEasyBtn.addEventListener("click", () => setMode(MODE_EASY));

    renderText();
    setMode(MODE_HARD);
    focusSurface();
  </script>
</body>
</html>
